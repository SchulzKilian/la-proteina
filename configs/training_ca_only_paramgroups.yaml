# Param-group ablation: full DiT/SiT/SD3-style optimizer split.
# Excludes biases + LayerNorm γ/β + embeddings + AdaLN-Zero gates from wd.
# Pushes wd from the canonical 0.05 → 0.10 because the gate-collapse cap
# that previously bounded wd above is removed by the param-group split.
# Otherwise: identical to the canonical OLD recipe (constant LR=2e-4,
# no scheduler, accumulate=32, EMA decay=0.999 every 5 steps).
# See experiments.md → E015 for the per-tensor analysis motivating this.
run_name_: ca_only_paramgroups_wd0p1

hardware:
  ncpus_per_task_train_: 24
  ncpus_per_task_prepro_: 24
  accelerator: gpu
  ngpus_per_node_: 1
  nnodes_: 1

defaults:
  - dataset: pdb/pdb_train_ucond
  - nn: ca_only_score_nn_160M
  - generation: validation_local_latents
  - _self_

pretrain_ckpt_path:

product_flowmatcher:
  bb_ca:
    zero_com_noise: True
    guidance_enabled: True
    dim: 3

loss:
  t_distribution:
    bb_ca:
      name: mix_unif_beta
      p1: 1.9
      p2: 1.0
      p3: 0.02
    shared_groups:

force_precision_f32: False

dataset:
  datamodule:
    dataselector:
      worst_resolution: 2.0

training:
  n_recycle: 0
  motif_conditioning: False
  self_cond: True
  p_folding_n_inv_folding_iters: 0.0
  use_precomputed_latents: False

lora:
  r: null
  lora_alpha: 32.0
  lora_dropout: 0.0
  train_bias: none

# OLD recipe — constant LR=2e-4, no scheduler. wd=0.10 + param-group split.
opt:
  lr: 0.0002
  max_epochs: 10000000
  accumulate_grad_batches: 32
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: auto
  val_check_interval: 2000
  weight_decay: 0.10
  param_groups: True

log:
  wandb_project: laproteina
  log_wandb: True
  log_every_n_steps: 1
  checkpoint: True
  checkpoint_every_n_steps: 10000
  last_ckpt_every_n_steps: 500

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 5
  cpu_offload: False

single: False
nolog: False
