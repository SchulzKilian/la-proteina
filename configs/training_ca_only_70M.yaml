defaults:
  - training_ca_only            # inherit all base CA-only settings
  - override nn: ca_only_score_nn_70M  # override nn to 70M model
  - _self_

run_name_: ca_only_diffusion_70M

# 70M model uses less VRAM (~50%) so we can double batch size
dataset:
  datamodule:
    batch_size: 72
    pin_memory: True
    prefetch_factor: 4

# Validate less frequently — 70M steps are fast, so val gaps are proportionally larger
opt:
  val_check_interval: 200
