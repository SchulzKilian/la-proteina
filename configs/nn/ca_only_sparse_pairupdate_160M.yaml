# Sparse-attention + pair-rep-update variant of the CA-only baseline.
#
# Architecture is byte-equivalent to `ca_only_sparse_160M.yaml` except for
# `update_pair_repr: True`. Triangle multiplication stays OFF (sparse mode
# raises if combined with use_tri_mult; see pair_update.py:65).
#
# Motivation: the canonical La-Proteina paper bundles `update_pair_repr`
# with `use_tri_mult` and disables both for compute reasons (Geffner et al.
# 2025, §3.3, App. H). In sparse mode the compute argument vanishes —
# triangle ops are forbidden anyway, and the pair MLP runs on
# [B, N, K=40, d] not [B, N, N, d], ~13× cheaper than dense.
#
# Closest published precedent: SALAD (Jendrusch & Korbel, Nat Mach Intell
# 2025) — sparse K-NN attention + pair feature updates without triangle
# multiplication, scales to 1000-residue proteins. This variant is the
# La-Proteina-on-PDB analog of that recipe.
#
# DO NOT change any other key here without bumping `run_name_` in the
# training config and noting the deviation. The point of this file is
# "ca_only_sparse_160M + pair updates, nothing else".
name: local_latents_transformer

output_parameterization:
  bb_ca: v

nlayers: 14
token_dim: 768
nheads: 12
parallel_mha_transition: False

strict_feats: False

feats_seq: ["xt_bb_ca", "x_sc_bb_ca", "optional_ca_coors_nm_seq_feat", "optional_res_type_seq_feat"]
feats_cond_seq: ["time_emb_bb_ca"]

dim_cond: 256
idx_emb_dim: 256
t_emb_dim: 256

feats_pair_repr: ["rel_seq_sep", "xt_bb_ca_pair_dists", "x_sc_bb_ca_pair_dists", "optional_ca_pair_dist"]
feats_pair_cond: ["time_emb_bb_ca"]

xt_pair_dist_dim: 30
xt_pair_dist_min: 0.1
xt_pair_dist_max: 3
x_sc_pair_dist_dim: 30
x_sc_pair_dist_min: 0.1
x_sc_pair_dist_max: 3
seq_sep_dim: 127
pair_repr_dim: 256

# THE ONLY DELTA vs ca_only_sparse_160M.yaml: pair updates ON.
# Triangle multiplication MUST stay False (pair_update.py:65 raises in sparse mode).
# update_pair_repr_every_n=3 → pair update after layers 0, 3, 6, 9, 12 (5 updates over 14 layers).
update_pair_repr: True
update_pair_repr_every_n: 3
use_tri_mult: False
use_downsampling: False

use_qkln: True

# Sparse attention (SALAD-style neighbor list). K = 2*8 + 8 + 16 = 40.
# When enabled, pair_rep is [b, n, K, pair_dim] instead of [b, n, n, pair_dim].
# Neighbor list is recomputed each forward pass from x_t["bb_ca"].
sparse_attention: true
n_seq_neighbors: 8       # sequential (residue-index) neighbors each side → 16 sequential total
n_spatial_neighbors: 8   # nearest Cα neighbors (excluding sequential picks)
n_random_neighbors: 16   # random neighbors sampled ∝ 1/d³_Cα (excluding seq + spatial)
