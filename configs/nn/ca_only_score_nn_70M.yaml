name: local_latents_transformer  # reuses same class, CA-only output mode

output_parameterization:
  bb_ca: v  # no local_latents entry -> NN will skip local_latents head

nlayers: 6  # 6 instead of 14 layers
token_dim: 768
nheads: 12
parallel_mha_transition: False

strict_feats: False

# local_latents features removed — only bb_ca features
feats_seq: ["xt_bb_ca", "x_sc_bb_ca", "optional_ca_coors_nm_seq_feat", "optional_res_type_seq_feat"]
feats_cond_seq: ["time_emb_bb_ca"]

dim_cond: 128  # Reduced from 256
idx_emb_dim: 128  # Reduced from 256
t_emb_dim: 128  # Reduced from 256

feats_pair_repr: ["rel_seq_sep", "xt_bb_ca_pair_dists", "x_sc_bb_ca_pair_dists", "optional_ca_pair_dist"]
feats_pair_cond: ["time_emb_bb_ca"]

xt_pair_dist_dim: 30
xt_pair_dist_min: 0.1
xt_pair_dist_max: 3
x_sc_pair_dist_dim: 30
x_sc_pair_dist_min: 0.1
x_sc_pair_dist_max: 3
seq_sep_dim: 127
pair_repr_dim: 128  # Reduced from 256

update_pair_repr: False
update_pair_repr_every_n: 3
use_tri_mult: False
use_downsampling: False

use_qkln: True
