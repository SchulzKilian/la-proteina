# K=64 sparse + softened low-t curriculum bucket.
#
# Sibling of training_ca_only_sparse_K64_curriculum.yaml. Identical recipe and
# NN config except the t<0.33 curriculum bucket is overridden from the harsh
# sequential-only (n_seq=32, n_sp=0, n_rd=0) to (n_seq=16, n_sp=8, n_rd=24) —
# the same composition as the mid bucket. Mid + high buckets unchanged.
#
# Motivation (investigation 2026-05-11): at L=100 the canonical (32, 0, 0)
# low-t bucket forces each query into a ±32-residue sequential window
# (64% coverage), preventing long-range information transport during the
# noisy refinement stage. The hypothesis is that this is a major contributor
# to the K=64 variant's L=100 underperformance (-11 pp vs canonical at
# step 1385). Softening the low-t bucket keeps spatial+random capacity
# available throughout the trajectory.
#
# RECIPE: locked to canonical OLD recipe (wd=0.05, constant LR=2e-4, no
# scheduler). DO NOT touch wd/LR/scheduler.
run_name_: ca_only_sparse_K64_curriculum_lowtsoft

hardware:
  ncpus_per_task_train_: 24
  ncpus_per_task_prepro_: 24
  accelerator: gpu
  ngpus_per_node_: 1
  nnodes_: 1

defaults:
  - dataset: pdb/pdb_train_ucond
  - nn: ca_only_sparse_K64_curriculum_160M
  - generation: validation_local_latents
  - _self_

pretrain_ckpt_path:  # null → cold start

product_flowmatcher:
  bb_ca:
    zero_com_noise: True
    guidance_enabled: True
    dim: 3

loss:
  t_distribution:
    bb_ca:
      name: mix_unif_beta
      p1: 1.9
      p2: 1.0
      p3: 0.02
    shared_groups:

force_precision_f32: False

dataset:
  datamodule:
    dataselector:
      worst_resolution: 2.0

training:
  n_recycle: 0
  motif_conditioning: False
  self_cond: True
  p_folding_n_inv_folding_iters: 0.0
  use_precomputed_latents: False
  curriculum_neighbors: True
  # Soften the low-t bucket: keep spatial+random capacity at t<0.33 too.
  # Must sum to K=64 = 2*n_seq + n_sp + n_rd.
  curriculum_low_t_split: [16, 8, 24]

lora:
  r: null
  lora_alpha: 32.0
  lora_dropout: 0.0
  train_bias: none

opt:
  lr: 0.0002
  max_epochs: 10000000
  accumulate_grad_batches: 32
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: auto
  val_check_interval: 2000
  weight_decay: 0.05
  compile_nn: True

log:
  wandb_project: laproteina
  log_wandb: True
  log_every_n_steps: 1
  checkpoint: True
  checkpoint_every_n_steps: 10000
  last_ckpt_every_n_steps: 500

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 5
  cpu_offload: False

single: False
nolog: False
