defaults:
  - inference_base
  - generation: uncond_codes_ca_only
  - _self_

run_name_: laproteina_sparse_K64_step1385_LOWTSOFT_n6_nfe400
config_name: inference_sparse_K64_step1385_LOWTSOFT_n6_nfe400

# Inference-only low-t bucket softening probe on the K=64 curriculum-self
# ckpt (best_val_00000013_000000001385.ckpt, val=4.1908).
#
# Sibling of `inference_sparse_K64_step1385_NOCURR_salad_n6_nfe400.yaml`.
# Where NOCURR forces curriculum off entirely (static SALAD-canonical at all t),
# this config keeps the curriculum ON but overrides the t<0.33 bucket from
# the harsh sequential-only (n_seq=32, n_sp=0, n_rd=0) to the mid bucket's
# (n_seq=16, n_sp=8, n_rd=24). The mid+high buckets are unchanged. Tests the
# investigation hypothesis (2026-05-11) that the harsh low-t bucket
# bottlenecks long-range information at the noisy-refinement stage.
#
# Distribution-shift test, NOT a clean architectural comparison: the ckpt
# was trained against the (32, 0, 0) low-t bucket, so seeing (16, 8, 24) at
# t<0.33 is OOD for the trained weights. Same caveat as the NOCURR override.
#
# nsteps inherited from `inference_base.yaml` (=400) per CLAUDE.md hard rule.
ckpt_path: /home/ks2218/la-proteina
ckpt_name: sparse_K64_curriculum_self_step1385.ckpt
autoencoder_ckpt_path:

generation:
  args:
    curriculum_neighbors: True
    curriculum_low_t_split: [16, 8, 24]
  dataset:
    nsamples: 6
    max_nsamples_per_batch: 6
    nlens_cfg:
      nres_lens: [50, 100, 200]
