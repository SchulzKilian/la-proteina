run_name_: test_ca_only_diffusion

hardware:
  ncpus_per_task_train_: 24
  ncpus_per_task_prepro_: 24
  accelerator: gpu
  ngpus_per_node_: 4
  nnodes_: 1

defaults:
  - dataset: pdb/pdb_train_ucond
  - nn: ca_only_score_nn_160M
  - generation: validation_local_latents
  - _self_

pretrain_ckpt_path:

# CA-only: only bb_ca modality, no local_latents, no autoencoder
product_flowmatcher:
  bb_ca:
    zero_com_noise: True
    guidance_enabled: True
    dim: 3

# No autoencoder_ckpt_path — CA-only mode skips it automatically

# Loss — bb_ca only
loss:
  t_distribution:
    bb_ca:
      name: mix_unif_beta
      p1: 1.9
      p2: 1.0
      p3: 0.02
  shared_groups:

force_precision_f32: False

training:
  n_recycle: 0
  motif_conditioning: False
  self_cond: True
  p_folding_n_inv_folding_iters: 0.1
  use_precomputed_latents: False

lora:
  r: null
  lora_alpha: 32.0
  lora_dropout: 0.0
  train_bias: none

opt:
  lr: 0.0001
  max_epochs: 10000000
  accumulate_grad_batches: 4
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: ddp
  val_check_interval: 100

log:
  wandb_project: laproteina
  log_wandb: True
  log_every_n_steps: 1
  checkpoint: True
  checkpoint_every_n_steps: 10000
  last_ckpt_every_n_steps: 1500

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 1
  cpu_offload: False

single: False
nolog: False
