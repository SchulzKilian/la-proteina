defaults:
  - inference_base
  - generation: uncond_codes_ca_only
  - _self_

run_name_: laproteina_ucond_ca_only_70M

# ckpt_path and ckpt_name are passed at runtime by gen_n_eval_ca_only.sh
# No autoencoder_ckpt_path — CA-only model asserts it is absent

generation:
  model:
    bb_ca:
      schedule:
        mode: log
        p: 2.0
      gt:
        mode: "1/t"
        p: 1.0
        clamp_val: null
      simulation_step_params:
        sampling_mode: sc
        sc_scale_noise: 0.1
        sc_scale_score: 1.0
        t_lim_ode: 0.98
        t_lim_ode_below: 0.02
        center_every_step: True
    # no local_latents block — only bb_ca exists in CA-only mode
