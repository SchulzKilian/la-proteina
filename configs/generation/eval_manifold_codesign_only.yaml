# Generation block for the sidechain-manifold perturbation experiment.
#
# Only codesignability is needed: ESMFold(original_seq) vs. perturbed structure,
# all-atom RMSD. The PDBs we evaluate are NOT generated by the flow model — they
# are perturbed real structures written by analysis_manifold/perturbation_experiment.py.
# evaluate.py reads each cell (one (k, space) combination) via --job_id and walks
# inference/eval_manifold_perturbation/ for files starting with job_<id>_.

# General sampling params (unused; kept so cfg validation doesn't choke).
args:
  fold_cond: False

# Dataset block: unused at evaluation time, kept so the schema is satisfied.
dataset:
  nlens_cfg:
    nres_lens: [50, 100, 200, 300]
    min_len:
    max_len:
    step_len:
  cath_codes: null
  nsamples: 1
  max_nsamples_per_batch: 1
  empirical_distribution_cfg:
    len_cath_code_path: null
    cath_code_level: null
    bucket_min_len: 50
    bucket_max_len: 300
    bucket_step_size: 50

# Metric block: codesignability only, all-atom RMSD only, ESMFold only.
metric:
  compute_designability: False
  designability_modes: ["all_atom"]
  designability_folding_models: ["esmfold"]

  compute_codesignability: True
  codesignability_modes: ["all_atom"]
  codesignability_folding_models: ["esmfold"]
  compute_co_sequence_recovery: False

  compute_novelty_pdb: False
  compute_novelty_afdb: False
  compute_novelty_afdb_rep_v4: False
  compute_novelty_afdb_rep_v4_geniefilters_maxlen512: False

  compute_motif_scaffolding: False
  compute_motif_backbone_designability: False
  compute_motif_aa_designability: False
  compute_motif_rmsd: False

  keep_folding_outputs: False

  compute_binder_metrics: False
  compute_multimer_metrics: False

  compute_fid: False
  metric_factory: null
