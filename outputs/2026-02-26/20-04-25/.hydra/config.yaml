dataset:
  datamodule:
    _target_: proteinfoundation.datasets.pdb_data.PDBLightningDataModule
    data_dir: ${oc.env:DATA_PATH}/pdb_train/
    in_memory: false
    format: cif
    overwrite: false
    batch_padding: true
    sampling_mode: cluster-random
    transforms:
    - _target_: proteinfoundation.datasets.transforms.CoordsToNanometers
    - _target_: proteinfoundation.datasets.transforms.CenterStructureTransform
    - _target_: proteinfoundation.datasets.transforms.GlobalRotationTransform
    - _target_: proteinfoundation.datasets.transforms.ChainBreakPerResidueTransform
    - _target_: proteinfoundation.datasets.transforms.PaddingTransform
      max_size: 256
      fill_value: 0
    batch_size: 32
    num_workers: 8
    pin_memory: true
    dataselector:
      _target_: proteinfoundation.datasets.pdb_data.PDBDataSelector
      data_dir: ${oc.env:DATA_PATH}/pdb_train/
      fraction: 1
      molecule_type: protein
      experiment_types:
      - diffraction
      - EM
      min_length: 50
      max_length: 256
      oligomeric_min: null
      oligomeric_max: null
      best_resolution: 0.0
      worst_resolution: 5.0
      has_ligands: []
      remove_ligands: []
      remove_non_standard_residues: true
      remove_pdb_unavailable: true
      exclude_ids:
      - 9b57
      - 9b5p
      - 9b5s
      - 9b5n
      - 9b5a
      - 9b5k
      - 9b5v
      - 9b59
      - 9b5w
      - 9b5g
      - 9b5i
      - 9b5x
      - 9b5d
      - 9b5e
      - 9b5t
      - 9b5f
      - 9b5o
      - 9b58
      - 9b5u
      - 9b5c
      - 9b5j
      - 9b5b
      - 9b5h
      - 9b5q
      - 9b5l
      - 9b56
      - 9b5m
      - 9b5l
      - 9b55
      - 9b5r
      - 9ij9
      - 9iix
      - 2ezq
      - 1kld
      - 1crr
      - 2ezs
      - 2ezr
      - 1vve
      - 7ll9_G
    datasplitter:
      _target_: proteinfoundation.datasets.pdb_data.PDBDataSplitter
      data_dir: ${oc.env:DATA_PATH}/pdb_train/
      train_val_test:
      - 0.98
      - 0.019
      - 0.001
      split_type: sequence_similarity
      split_sequence_similarity: 0.5
      overwrite_sequence_clusters: false
    use_precomputed_latents: false
nn:
  name: local_latents_transformer
  output_parameterization:
    bb_ca: v
    local_latents: v
  nlayers: 6
  token_dim: 768
  nheads: 12
  parallel_mha_transition: false
  strict_feats: false
  feats_seq:
  - xt_bb_ca
  - xt_local_latents
  - x_sc_bb_ca
  - x_sc_local_latents
  - optional_ca_coors_nm_seq_feat
  - optional_res_type_seq_feat
  feats_cond_seq:
  - time_emb_bb_ca
  - time_emb_local_latents
  dim_cond: 128
  idx_emb_dim: 128
  t_emb_dim: 128
  feats_pair_repr:
  - rel_seq_sep
  - xt_bb_ca_pair_dists
  - x_sc_bb_ca_pair_dists
  - optional_ca_pair_dist
  feats_pair_cond:
  - time_emb_bb_ca
  - time_emb_local_latents
  xt_pair_dist_dim: 30
  xt_pair_dist_min: 0.1
  xt_pair_dist_max: 3
  x_sc_pair_dist_dim: 30
  x_sc_pair_dist_min: 0.1
  x_sc_pair_dist_max: 3
  seq_sep_dim: 127
  pair_repr_dim: 128
  update_pair_repr: false
  update_pair_repr_every_n: 3
  use_tri_mult: false
  use_downsampling: false
  use_qkln: true
generation:
  args:
    nsteps: 200
    self_cond: false
    fold_cond: false
    guidance_w: 1.0
    ag_ratio: 0.0
    ag_ckpt_path: null
  dataset:
    nlens_cfg:
      nres_lens:
      - 25
      min_len: null
      max_len: null
      step_len: null
    cath_codes: null
    nsamples: 20
    max_nsamples_per_batch: 5
    empirical_distribution_cfg:
      len_cath_code_path: null
      cath_code_level: null
      bucket_min_len: 50
      bucket_max_len: 274
      bucket_step_size: 25
  model:
    ode:
      bb_ca:
        schedule:
          mode: uniform
          p: 1.0
        gt:
          mode: tan
          p: 1.0
          clamp_val: null
        simulation_step_params:
          sampling_mode: vf
          sc_scale_noise: 0.0
          sc_scale_score: 0.0
          t_lim_ode: 0.98
          t_lim_ode_below: 0.02
          center_every_step: true
      local_latents:
        schedule:
          mode: uniform
          p: 1.0
        gt:
          mode: tan
          p: 1.0
          clamp_val: null
        simulation_step_params:
          sampling_mode: vf
          sc_scale_noise: 0.0
          sc_scale_score: 0.0
          t_lim_ode: 0.98
          t_lim_ode_below: 0.02
          center_every_step: false
    temp_035_only_ca:
      bb_ca:
        schedule:
          mode: uniform
          p: 1.0
        gt:
          mode: tan
          p: 1.0
          clamp_val: null
        simulation_step_params:
          sampling_mode: sc
          sc_scale_noise: 0.35
          sc_scale_score: 1.0
          t_lim_ode: 0.98
          t_lim_ode_below: 0.02
          center_every_step: true
      local_latents:
        schedule:
          mode: uniform
          p: 1.0
        gt:
          mode: tan
          p: 1.0
          clamp_val: null
        simulation_step_params:
          sampling_mode: vf
          sc_scale_noise: 0.0
          sc_scale_score: 0.0
          t_lim_ode: 0.98
          t_lim_ode_below: 0.02
          center_every_step: false
    temp_035_all:
      bb_ca:
        schedule:
          mode: uniform
          p: 1.0
        gt:
          mode: tan
          p: 1.0
          clamp_val: null
        simulation_step_params:
          sampling_mode: sc
          sc_scale_noise: 0.35
          sc_scale_score: 1.0
          t_lim_ode: 0.98
          t_lim_ode_below: 0.02
          center_every_step: true
      local_latents:
        schedule:
          mode: uniform
          p: 1.0
        gt:
          mode: tan
          p: 1.0
          clamp_val: null
        simulation_step_params:
          sampling_mode: sc
          sc_scale_noise: 0.35
          sc_scale_score: 1.0
          t_lim_ode: 0.98
          t_lim_ode_below: 0.02
          center_every_step: false
  metric:
    compute_designability: false
    compute_novelty_pdb: false
    compute_novelty_afdb: false
    compute_fid: true
    metric_factory:
    - metrics:
      - FID
      - fJSD_C
      - fJSD_A
      - fJSD_T
      ckpt_path: ${oc.env:DATA_PATH}/metric_factory/model_weights/gearnet_ca.pth
      real_features_path: ${oc.env:DATA_PATH}/metric_factory/features/pdb_eval_ca_features.pth
      ca_only: true
      prefix: PDB_
    - metrics:
      - FID
      - fJSD_C
      - fJSD_A
      - fJSD_T
      ckpt_path: ${oc.env:DATA_PATH}/metric_factory/model_weights/gearnet_ca.pth
      real_features_path: ${oc.env:DATA_PATH}/metric_factory/features/afdb_eval_ca_features.pth
      ca_only: true
      prefix: AFDB_
    - metrics:
      - IS_C
      - IS_A
      - IS_T
      ckpt_path: ${oc.env:DATA_PATH}/metric_factory/model_weights/gearnet_ca.pth
      ca_only: true
run_name_: test_release_diffusion
hardware:
  ncpus_per_task_train_: 4
  ncpus_per_task_prepro_: 24
  accelerator: gpu
  ngpus_per_node_: 4
  nnodes_: 1
pretrain_ckpt_path: ./checkpoints_laproteina/AE1_ucond_512.ckpt
product_flowmatcher:
  bb_ca:
    zero_com_noise: true
    guidance_enabled: true
    dim: 3
  local_latents:
    zero_com_noise: false
    guidance_enabled: true
    dim: 8
autoencoder_ckpt_path: ./checkpoints_laproteina/AE1_ucond_512.ckpt
loss:
  t_distribution:
    bb_ca:
      name: mix_unif_beta
      p1: 1.9
      p2: 1.0
      p3: 0.02
    local_latents:
      name: mix_unif_beta
      p1: 1.0
      p2: 1.5
      p3: 0.2
    shared_groups: null
force_precision_f32: false
training:
  n_recycle: 0
  motif_conditioning: false
  self_cond: true
  p_folding_n_inv_folding_iters: 0.1
  use_precomputed_latents: false
lora:
  r: null
  lora_alpha: 32.0
  lora_dropout: 0.0
  train_bias: none
opt:
  lr: 0.0001
  max_epochs: 1
  accumulate_grad_batches: 1
  skip_nan_grad: false
  grad_and_weight_analysis: false
  dist_strategy: ddp
  val_check_interval: 100
log:
  wandb_project: laproteina
  log_wandb: true
  log_every_n_steps: 1
  checkpoint: true
  checkpoint_every_n_steps: 10000
  last_ckpt_every_n_steps: 1500
seed: 42
ema:
  decay: 0.999
  validate_original_weights: false
  every_n_steps: 1
  cpu_offload: false
single: true
nolog: true
