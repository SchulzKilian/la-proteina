steering:
  enabled: true
  checkpoint: logs/multitask_t1/<timestamp>/checkpoints/fold_0_best.pt

  objectives:
    - property: sap
      direction: minimize
      weight: 1.0

  schedule:
    type: cosine_ramp
    w_max: 3.0
    t_start: 0.3
    t_end: 1.0

  gradient_norm: unit
  gradient_clip: 10.0
  channel: local_latents
  log_diagnostics: true
