# Noise-aware predictor baseline (w=1) — same fold as tango_min_w16_fold2.yaml.
# Provides the apples-to-apples reference point for computing Δ tango
# under the same predictor; comparing against the original ensemble run's
# w=1 cell would conflate predictor differences with weight differences.
steering:
  enabled: true
  checkpoint: /home/ks2218/la-proteina/laproteina_steerability/logs/multitask_t1_noise_aware/20260505_110348/checkpoints/fold_2_best.pt

  objectives:
    - property: tango
      direction: minimize
      weight: 1.0

  schedule:
    type: linear_ramp
    w_max: 1.0
    t_start: 0.3
    t_end: 0.8
    t_stop: 0.9

  gradient_norm: unit
  gradient_clip: 10.0
  channel: local_latents
  log_diagnostics: true
