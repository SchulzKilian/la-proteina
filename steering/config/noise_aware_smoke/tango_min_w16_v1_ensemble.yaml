# 5-fold ensemble of v1 noise-aware checkpoints (mean-z-scored prediction
# across folds → adversarial directions that fool one fold attenuate via
# inter-fold averaging). Uses legacy x_1_est + t=1.0 path because it
# beat z_t-direct in the head-to-head.
steering:
  enabled: true
  checkpoint:
    - /home/ks2218/la-proteina/laproteina_steerability/logs/multitask_t1_noise_aware/20260505_110348/checkpoints/fold_0_best.pt
    - /home/ks2218/la-proteina/laproteina_steerability/logs/multitask_t1_noise_aware/20260505_110348/checkpoints/fold_1_best.pt
    - /home/ks2218/la-proteina/laproteina_steerability/logs/multitask_t1_noise_aware/20260505_110348/checkpoints/fold_2_best.pt
    - /home/ks2218/la-proteina/laproteina_steerability/logs/multitask_t1_noise_aware/20260505_110348/checkpoints/fold_3_best.pt
    - /home/ks2218/la-proteina/laproteina_steerability/logs/multitask_t1_noise_aware/20260505_110348/checkpoints/fold_4_best.pt

  objectives:
    - property: tango
      direction: minimize
      weight: 1.0

  schedule:
    type: linear_ramp
    w_max: 16.0
    t_start: 0.3
    t_end: 0.8
    t_stop: 0.9

  gradient_norm: unit
  gradient_clip: 10.0
  channel: local_latents
  log_diagnostics: true
