steering:
  enabled: true
  checkpoint: steering/checkpoints/dummy_fold_0_best.pt

  objectives:
    - property: net_charge
      direction: maximize
      weight: 1.0

  schedule:
    type: linear_ramp
    w_max: 2.0
    t_start: 0.3
    t_end: 1.0

  gradient_norm: unit
  gradient_clip: 10.0
  channel: local_latents
  log_diagnostics: true
